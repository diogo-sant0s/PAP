{% extends "base.html" %}

{% block content %}
<div class="d-flex align-items-center justify-content-center vh-100 bg-light">
  <main class="w-100" style="max-width: 330px;">
    <form method="POST" action="/login" class="p-4 border rounded-3 bg-white shadow-sm">
      <div class="text-center mb-3">
        <img src="{{ url_for('static', filename='img/favicon.ico') }}" alt="Logo" style="width: 60px; height: 60px;">
      </div>
      <h1 class="h3 mb-3 fw-normal text-center">Login</h1>

      {% if error %}
        <div class="alert alert-danger py-2" role="alert">
          {{ error }}
        </div>
      {% endif %}

      <div class="form-floating mb-2">
        <input
          type="text"
          class="form-control"
          id="login_input"
          name="login_input"
          placeholder="Utilizador"
          required
        >
        <label for="login_input">Utilizador</label>
      </div>

      <div class="form-floating mb-3">
        <input
          type="password"
          class="form-control"
          id="password_input"
          name="password_input"
          placeholder="Password"
          required
        >
        <label for="password_input">Password</label>
      </div>

      <button class="w-100 btn btn-lg btn-primary" type="submit">
        Entrar
      </button>
    </form>
  </main>
</div>
{% endblock %}
